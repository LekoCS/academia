<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230D0E11'/%3E%3Ctext x='50' y='70' font-family='Arial Black,sans-serif' font-size='58' font-weight='900' fill='%23C8FA3C' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E">

<style>
  :root{
    --bg:#0D0E11;
    --surface:#16181D;
    --surface-2:#1E2128;
    --border:#2A2E37;
    --text:#ECEEF2;
    --muted:#868D9B;
    --accent:#C8FA3C;
    --accent-dim:#8aac2a;
    --down:#FF6B6B;
    --radius:16px;
    --display:'Barlow Condensed',sans-serif;
    --body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:var(--body)}
  body{max-width:560px;margin:0 auto;padding:0 16px calc(40px + env(safe-area-inset-bottom));min-height:100vh}

  /* HEADER */
  header{padding:26px 2px 18px;position:sticky;top:0;background:linear-gradient(var(--bg) 78%,transparent);z-index:20}
  .wordmark{display:flex;align-items:baseline;gap:10px}
  .wordmark h1{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:.5px;text-transform:uppercase;line-height:1}
  .wordmark h1 span{color:var(--accent)}
  .date{margin-left:auto;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;text-align:right}

  /* DAY SELECTOR */
  .days{display:flex;gap:8px;margin-top:18px}
  .day-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:11px 0;font-family:var(--display);font-weight:700;font-size:20px;color:var(--muted);
    text-align:center;cursor:pointer;transition:.18s;letter-spacing:1px}
  .day-pill.active{background:var(--accent);color:#0D0E11;border-color:var(--accent)}
  .day-title{margin-top:14px;display:flex;align-items:center;gap:10px}
  .day-title h2{font-family:var(--display);font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:.4px}
  .day-title .count{font-size:12px;color:var(--muted);background:var(--surface-2);border:1px solid var(--border);
    padding:3px 9px;border-radius:20px;letter-spacing:.4px}

  /* EXERCISE CARD */
  .list{margin-top:16px;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;
    animation:rise .35s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .ex-name{font-family:var(--display);font-weight:700;font-size:21px;line-height:1.05;letter-spacing:.3px}
  .series-tag{flex-shrink:0;font-family:var(--display);font-weight:600;font-size:15px;color:var(--accent);
    background:rgba(200,250,60,.09);border:1px solid rgba(200,250,60,.25);padding:4px 10px;border-radius:10px;
    letter-spacing:.5px;white-space:nowrap}
  .obs{margin-top:8px;font-size:13.5px;line-height:1.5;color:var(--muted);display:none}
  .obs.open{display:block}
  .obs-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 5px;border-radius:6px;flex-shrink:0;line-height:1;transition:.15s}
  .obs-btn.active{color:var(--accent)}
  .obs-btn:active{background:var(--surface-2)}

  /* PROGRESS */
  .progress-wrap{margin-top:10px;display:flex;align-items:center;gap:10px}
  .progress-track{flex:1;height:4px;background:var(--surface-2);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease}
  .progress-label{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;letter-spacing:.3px}
  .progress-label.done{color:var(--accent);font-weight:700}
  .last-trained{font-size:11px;color:var(--muted);letter-spacing:.3px;margin-left:4px}

  /* STATS + SPARK */
  .metrics{display:flex;align-items:center;gap:18px;margin-top:14px}
  .metric .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
  .metric .val{font-family:var(--display);font-weight:700;font-size:24px;line-height:1;margin-top:3px;display:flex;align-items:baseline;gap:3px}
  .metric .val u{font-style:normal;font-size:12px;color:var(--muted);font-family:var(--body);font-weight:500}
  .pr .val{color:var(--accent)}
  .trend{font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:2px}
  .trend.up{color:var(--accent)} .trend.down{color:var(--down)} .trend.flat{color:var(--muted)}
  .spark{margin-left:auto;width:96px;height:38px;flex-shrink:0}
  .spark .empty{font-size:10px;color:var(--muted);line-height:38px;text-align:right;display:block;letter-spacing:.3px}

  /* ADD ROW */
  .add{display:flex;gap:8px;margin-top:15px}
  .add input{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;color:var(--text);
    font-family:var(--body);font-size:16px;font-weight:600;padding:11px 12px;width:100%;min-width:0;outline:none;transition:.15s}
  .add input::placeholder{color:var(--muted);font-weight:500}
  .add input:focus{border-color:var(--accent-dim)}
  .add .kg{flex:1.4} .add .reps{flex:1}
  .add button{flex-shrink:0;background:var(--accent);color:#0D0E11;border:none;border-radius:11px;
    font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.5px;padding:0 16px;cursor:pointer;
    text-transform:uppercase;transition:.15s}
  .add button:active{transform:scale(.96)}

  /* HISTORY */
  .hist-toggle{margin-top:12px;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;
    display:flex;align-items:center;gap:5px;font-family:var(--body);letter-spacing:.3px;padding:2px}
  .hist-toggle .chev{transition:.2s;font-size:10px}
  .hist-toggle.open .chev{transform:rotate(180deg)}
  .hist{display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:6px}
  .hist.open{display:block}
  .h-row{display:flex;align-items:center;gap:10px;padding:8px 2px;font-size:13.5px;border-bottom:1px solid rgba(42,46,55,.5)}
  .h-row:last-child{border-bottom:none}
  .h-row .h-date{color:var(--muted);width:54px;font-variant-numeric:tabular-nums}
  .h-row .h-w{font-weight:700;font-family:var(--display);font-size:17px}
  .h-row .h-r{color:var(--muted);font-size:12px}
  .h-row .h-pr{font-size:10px;color:var(--accent);border:1px solid rgba(200,250,60,.3);padding:1px 6px;border-radius:6px;letter-spacing:.5px}
  .h-row .del{margin-left:auto;color:var(--muted);background:none;border:none;cursor:pointer;font-size:15px;padding:4px 6px;border-radius:8px}
  .h-row .del:active{background:var(--surface-2)}

  /* FOOTER TOOLS */
  .tools{margin-top:26px;text-align:center;display:flex;gap:16px;justify-content:center}
  .tools button{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--body);
    letter-spacing:.4px;padding:6px}
  .tools button:active{color:var(--text)}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--accent);
    color:#0D0E11;font-weight:700;font-family:var(--display);font-size:16px;letter-spacing:.5px;padding:10px 20px;
    border-radius:12px;opacity:0;pointer-events:none;transition:.25s;z-index:50;text-transform:uppercase}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<!-- ============================================================= -->
<!--  SUA ROTINA  —  edite somente este objeto pra mudar o treino  -->
<!--                                                               -->
<!--  • Mantenha o "id" de cada exercício SEMPRE igual: é ele que  -->
<!--    guarda o seu histórico de peso. Mudou o id = histórico zera.-->
<!--  • "series" é só texto livre (ex: "4 × 8-12", "3 × até falha")-->
<!--  • "obs" é a observação que aparece em cinza no card.         -->
<!-- ============================================================= -->
<script>
const ROTINA = {
  A: {
    nome: "Peito, Ombros & Tríceps",
    exercicios: [
      { id:"supino-reto",        nome:"Supino Reto com Barra",            series:"4 × 4-6",      obs:"Desça em 3s até o médio-peito, toque leve sem quicar. Escápulas retraídas, punhos sobre os cotovelos. Suba explosivo." },
      { id:"supino-inclinado",   nome:"Supino Inclinado Halteres",        series:"4 × 8-10",     obs:"Banco 30-45°. Halteres sobem levemente ao centro sem se tocar. Corrija assimetrias entre os lados." },
      { id:"desenvolvimento",    nome:"Desenvolvimento com Barra/Halteres",series:"4 × 6-8",      obs:"Core braced, glúteos contraídos para proteger a lombar. Empurre a cabeça pra frente no topo (lockout total). Desça em 2s." },
      { id:"elevacao-lateral",   nome:"Elevação Lateral (Polia/Haltere)", series:"3 × 12-15",    obs:"Suba até os ombros paralelos ao chão. Polegar levemente para baixo no topo. Desça controlado — o negativo é onde o estímulo vive." },
      { id:"triceps-frances",    nome:"Extensão de Tríceps Overhead",     series:"3 × 10-12",    obs:"Cabeça longa em alongamento total. Braços verticais colados às orelhas. Desça em 3s, pause 1s no fundo, estenda até o lockout." },
      { id:"triceps-corda",      nome:"Tríceps Polia Alta (Corda)",       series:"3 × 12-15",    obs:"Cotovelos fixos ao lado do corpo. Abra a corda no final, segure 1s na contração. Retorne até antebraços paralelos ao chão." },
      { id:"elevacao-joelhos",   nome:"Elevação de Joelhos na Barra",     series:"3 × 12-15",    obs:"Retroversão pélvica antes de subir as pernas — abdômen inicia o movimento. Suba até 90°+. Desça devagar, sem balançar." },
    ]
  },
  B: {
    nome: "Costas, Bíceps & Core",
    exercicios: [
      { id:"barra-fixa",         nome:"Barra Fixa com Carga",             series:"4 × 4-6",      obs:"Deprima as escápulas antes de dobrar os cotovelos. Queixo acima da barra, desça em 2-3s até extensão total. Adicione peso quando bater 8+ reps." },
      { id:"remada-curvada",     nome:"Remada Curvada com Barra",         series:"4 × 5-7",      obs:"Tronco ~45°, barra até o esterno inferior. Aperte as escápulas por 1s no topo. Core rígido — exercício antiflexão também." },
      { id:"remada-unilateral",  nome:"Remada Unilateral com Haltere",    series:"3 × 8-10 /lado",obs:"Coluna neutra. Parta com o braço estendido (escápula protrai no fundo) e suba até o cotovelo ultrapassar a linha das costas." },
      { id:"face-pull",          nome:"Face Pull na Polia (Corda)",       series:"3 × 15-20",    obs:"Puxe até a altura do rosto, abrindo nas laterais da cabeça — polegares apontados pra trás. Pause 2s. Carga leve, foco na técnica." },
      { id:"rosca-direta",       nome:"Rosca Direta com Barra",           series:"3 × 8-10",     obs:"Cotovelos colados, sem viajar pra frente. Supine totalmente no topo, pause 1s. Desça em 2-3s. EZ-bar se houver desconforto no pulso." },
      { id:"rosca-inclinada",    nome:"Rosca Inclinada com Halteres",     series:"3 × 10-12",    obs:"Banco 45-60°: braços pendurados em extensão total (alonga a cabeça longa do bíceps). Supine no topo, controle o negativo." },
      { id:"dead-bug",           nome:"Dead Bug",                         series:"3 × 10 /lado", obs:"Lombar colada no chão SEMPRE. Estenda braço e perna opostos, pause 1-2s. Se a lombar descolar, encurte a amplitude." },
    ]
  },
  C: {
    nome: "Pernas & Core",
    exercicios: [
      { id:"agachamento",        nome:"Agachamento Livre com Barra",      series:"4 × 4-6",      obs:"Grande respiração, core 360°. Joelhos na direção dos pés. Desça até a dobra do quadril abaixo do joelho. Barra em linha vertical sobre o médio-pé." },
      { id:"stiff",              nome:"Levantamento Terra Romeno (RDL)",  series:"4 × 8-10",     obs:"Empurre o quadril pra trás (não pra baixo), barra colada às coxas. Desça até o limite com coluna neutra. Suba dirigindo os quadris pra frente." },
      { id:"agachamento-bulgaro",nome:"Agachamento Búlgaro",              series:"3 × 8-10 /perna",obs:"Pé traseiro no banco, pé da frente avançado para a canela ficar vertical no fundo. Desça até a coxa paralela. ~85% da carga no pé da frente." },
      { id:"leg-press",          nome:"Leg Press 45°",                    series:"3 × 10-15",    obs:"Pés na largura do quadril, meio da plataforma. Estenda até quase travar — mantenha tensão. Desça com controle, sem quicar no fundo." },
      { id:"mesa-flexora",       nome:"Mesa Flexora (Lying Leg Curl)",    series:"3 × 12-15",    obs:"Quadris planos no apoio. Curve em direção aos glúteos, segure 1s no topo. Desça em 2s a partir de extensão total." },
      { id:"hip-thrust",         nome:"Hip Thrust com Barra",             series:"3 × 10-12",    obs:"Costas no banco, barra no vinco do quadril (use proteção). Suba explosivo espremendo os glúteos — tronco paralelo ao chão. Segure 2s no topo." },
      { id:"panturrilha",        nome:"Elevação de Panturrilha em Pé",    series:"4 × 15-20",    obs:"Na borda de um degrau, calcanhares para baixo (alongamento total) e tão alto quanto possível no topo. Segure 2s. Amplitude completa é essencial." },
      { id:"prancha",            nome:"Prancha (Frontal + Lateral)",      series:"3 × 45-60s",   obs:"Frontal: aperte quadríceps, glúteos e abdômen ao mesmo tempo. Lateral: corpo em linha diagonal. Progressão: RKC plank." },
    ]
  },
};
</script>

<header>
  <div class="wordmark">
    <h1>TREI<span>NO</span></h1>
    <div class="date" id="date"></div>
  </div>
  <div class="days" id="days"></div>
  <div class="progress-wrap" id="progressWrap"></div>
  <div class="day-title">
    <h2 id="dayName"></h2>
    <span class="count" id="dayCount"></span>
    <span class="last-trained" id="lastTrained"></span>
  </div>
</header>

<div class="list" id="list"></div>

<div class="tools">
  <button id="exportBtn">Exportar dados</button>
  <button id="clearBtn">Apagar histórico</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_KEY = 'gym-logs-v1';
// Dentro do Claude usa o armazenamento do artifact; hospedado fora usa o localStorage do celular.
const hasArtifactStorage = typeof window !== 'undefined' && window.storage;
let logs = {};          // { exerciseId: [ {date, weight, reps} ] }
let currentDay = 'A';
const expanded = new Set();
const obsExpanded = new Set();

async function loadLogs(){
  if(hasArtifactStorage){
    try{ const r = await window.storage.get(STORE_KEY); return r ? JSON.parse(r.value) : {}; }
    catch(e){ return {}; }
  }
  try{ const s = localStorage.getItem(STORE_KEY); return s ? JSON.parse(s) : {}; }
  catch(e){ return {}; }
}
async function saveLogs(){
  if(hasArtifactStorage){
    try{ await window.storage.set(STORE_KEY, JSON.stringify(logs)); }
    catch(e){ console.error('Falha ao salvar', e); toast('Erro ao salvar'); }
    return;
  }
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(logs)); }
  catch(e){ console.error('Falha ao salvar', e); toast('Erro ao salvar'); }
}

/* ---------- helpers ---------- */
function fmtDate(iso){ const d=new Date(iso); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function entries(id){ return (logs[id]||[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date)); }
function pr(id){ const e=entries(id); return e.length? Math.max(...e.map(x=>x.weight)) : null; }
function last(id){ const e=entries(id); return e.length? e[e.length-1] : null; }

function ultimoTreinoRegistrado(){
  const ordem=Object.keys(ROTINA);
  let ultimoDia=null,ultimaData=null;
  for(const dia of ordem){
    for(const ex of ROTINA[dia].exercicios){
      const e=entries(ex.id);
      if(e.length){ const d=new Date(e[e.length-1].date); if(!ultimaData||d>ultimaData){ultimaData=d;ultimoDia=dia;} }
    }
  }
  return ultimoDia?{dia:ultimoDia,data:ultimaData}:null;
}

function sugerirDia(){
  const ordem=Object.keys(ROTINA);
  const u=ultimoTreinoRegistrado();
  if(!u) return 'A';
  if(u.data.toDateString()===new Date().toDateString()) return u.dia;
  return ordem[(ordem.indexOf(u.dia)+1)%ordem.length];
}

function concluidosHoje(dia){
  const hoje=new Date().toDateString();
  return ROTINA[dia].exercicios.filter(ex=>(logs[ex.id]||[]).some(x=>new Date(x.date).toDateString()===hoje)).length;
}

function sparkline(id){
  const e = entries(id);
  if(e.length < 2) return `<svg class="spark"><text class="empty" x="96" y="0">${e.length?'1 registro':'sem registros'}</text></svg>`;
  const ws = e.map(x=>x.weight), W=96,H=38,pad=4;
  const min=Math.min(...ws), max=Math.max(...ws), span=(max-min)||1;
  const pts = ws.map((w,i)=>{
    const x = pad + i*(W-2*pad)/(ws.length-1);
    const y = H-pad - ((w-min)/span)*(H-2*pad);
    return [x,y];
  });
  const line = pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const lastP = pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${W} ${H}">
    <polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lastP[0].toFixed(1)}" cy="${lastP[1].toFixed(1)}" r="3" fill="var(--accent)"/>
  </svg>`;
}

function trend(id){
  const e = entries(id);
  if(e.length < 2) return '';
  const a=e[e.length-2].weight, b=e[e.length-1].weight, diff=+(b-a).toFixed(1);
  if(diff>0) return `<span class="trend up">▲ +${diff}kg</span>`;
  if(diff<0) return `<span class="trend down">▼ ${diff}kg</span>`;
  return `<span class="trend flat">● igual</span>`;
}

/* ---------- render ---------- */
function renderDays(){
  const days = document.getElementById('days');
  days.innerHTML = Object.keys(ROTINA).map(k=>
    `<button class="day-pill ${k===currentDay?'active':''}" data-day="${k}">${k}</button>`).join('');
  document.getElementById('dayName').textContent = ROTINA[currentDay].nome;
  const n = ROTINA[currentDay].exercicios.length;
  document.getElementById('dayCount').textContent = n+' exercícios';

  const u=ultimoTreinoRegistrado();
  const ltEl=document.getElementById('lastTrained');
  if(u){
    const diff=Math.floor((new Date()-u.data)/(1000*60*60*24));
    const tempo=diff===0?'hoje':diff===1?'ontem':`há ${diff} dias`;
    ltEl.textContent=`· Último: ${u.dia} ${tempo}`;
  } else { ltEl.textContent=''; }

  const feitos=concluidosHoje(currentDay), total=n;
  const pct=total?Math.round(feitos/total*100):0;
  const done=feitos===total&&total>0;
  document.getElementById('progressWrap').innerHTML=`
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="progress-label ${done?'done':''}">${done?'✓ completo':feitos+' / '+total}</span>`;
}

function renderList(){
  const list = document.getElementById('list');
  list.innerHTML = ROTINA[currentDay].exercicios.map(ex=>{
    const l = last(ex.id), p = pr(ex.id), isOpen = expanded.has(ex.id);
    const e = entries(ex.id);
    const histRows = e.slice().reverse().map((x,idx,arr)=>{
      const isPr = p!==null && x.weight===p;
      return `<div class="h-row">
        <span class="h-date">${fmtDate(x.date)}</span>
        <span class="h-w">${x.weight}kg</span>
        ${x.reps?`<span class="h-r">× ${x.reps}</span>`:''}
        ${isPr?'<span class="h-pr">PR</span>':''}
        <button class="del" data-del="${ex.id}" data-date="${x.date}">✕</button>
      </div>`;
    }).join('') || '<div class="h-row"><span class="h-date" style="color:var(--muted)">Nenhum registro ainda.</span></div>';

    const obsOpen = obsExpanded.has(ex.id);
    return `<div class="card">
      <div class="card-top">
        <div class="ex-name">${ex.nome}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <div class="series-tag">${ex.series}</div>
          ${ex.obs?`<button class="obs-btn ${obsOpen?'active':''}" data-obs="${ex.id}" title="Instruções">ⓘ</button>`:''}
        </div>
      </div>
      ${ex.obs?`<div class="obs ${obsOpen?'open':''}">${ex.obs}</div>`:''}
      <div class="metrics">
        <div class="metric">
          <div class="lbl">Último</div>
          <div class="val">${l?l.weight:'—'}<u>${l?'kg':''}</u></div>
        </div>
        <div class="metric pr">
          <div class="lbl">Recorde</div>
          <div class="val">${p!==null?p:'—'}<u>${p!==null?'kg':''}</u></div>
        </div>
        <div style="align-self:flex-end">${trend(ex.id)}</div>
        ${sparkline(ex.id)}
      </div>
      <div class="add">
        <input class="kg" type="number" inputmode="decimal" step="any" placeholder="peso (kg)" data-kg="${ex.id}">
        <input class="reps" type="number" inputmode="numeric" placeholder="reps" data-reps="${ex.id}">
        <button data-reg="${ex.id}">Registrar</button>
      </div>
      <button class="hist-toggle ${isOpen?'open':''}" data-tog="${ex.id}">
        ${e.length} registro${e.length===1?'':'s'} <span class="chev">▼</span>
      </button>
      <div class="hist ${isOpen?'open':''}">${histRows}</div>
    </div>`;
  }).join('');
}

function render(){ renderDays(); renderList(); }

/* ---------- actions ---------- */
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}

async function registrar(id){
  const kgEl=document.querySelector(`[data-kg="${id}"]`), repsEl=document.querySelector(`[data-reps="${id}"]`);
  const raw=kgEl.value.trim();
  const w=raw===''?0:parseFloat(raw);
  if(isNaN(w)||w<0){ kgEl.focus(); toast('Peso inválido'); return; }
  const reps = repsEl.value ? parseInt(repsEl.value) : null;
  if(!logs[id]) logs[id]=[];
  logs[id].push({ date:new Date().toISOString(), weight:w, reps });
  await saveLogs();
  expanded.add(id);
  render();
  toast(w+'kg registrado');
}

async function deletar(id, date){
  logs[id] = (logs[id]||[]).filter(x=>x.date!==date);
  if(logs[id].length===0) delete logs[id];
  await saveLogs();
  render();
}

document.addEventListener('click', async (e)=>{
  const t=e.target.closest('[data-day],[data-reg],[data-tog],[data-del],[data-obs]');
  if(!t) return;
  if(t.dataset.day){ currentDay=t.dataset.day; render(); }
  else if(t.dataset.reg){ registrar(t.dataset.reg); }
  else if(t.dataset.tog){ const id=t.dataset.tog; expanded.has(id)?expanded.delete(id):expanded.add(id); render(); }
  else if(t.dataset.del){ deletar(t.dataset.del, t.dataset.date); }
  else if(t.dataset.obs){ const id=t.dataset.obs; obsExpanded.has(id)?obsExpanded.delete(id):obsExpanded.add(id); render(); }
});

document.addEventListener('keydown',(e)=>{
  if(e.key==='Enter' && e.target.dataset && (e.target.dataset.kg||e.target.dataset.reps)){
    registrar(e.target.dataset.kg || e.target.dataset.reps);
  }
});

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const data = JSON.stringify(logs,null,2);
  navigator.clipboard?.writeText(data).then(()=>toast('Copiado'),()=>toast('Erro'));
});
document.getElementById('clearBtn').addEventListener('click', async ()=>{
  if(!confirm('Apagar TODO o histórico de pesos? Isso não pode ser desfeito.')) return;
  logs={}; await saveLogs();
  if(hasArtifactStorage){ try{ await window.storage.delete(STORE_KEY); }catch(e){} }
  else { try{ localStorage.removeItem(STORE_KEY); }catch(e){} }
  render(); toast('Histórico apagado');
});

/* ---------- init ---------- */
(function initDate(){
  const dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const d=new Date();
  document.getElementById('date').textContent = `${dias[d.getDay()]} • ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
})();

// Pede ao navegador pra marcar os dados como persistentes (não apaga pra liberar espaço).
(async function persist(){
  try{ if(navigator.storage && navigator.storage.persist){ await navigator.storage.persist(); } }
  catch(e){}
})();

(async function(){ logs = await loadLogs(); currentDay = sugerirDia(); render(); })();
</script>
</body>
</html>
